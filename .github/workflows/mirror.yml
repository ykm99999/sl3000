name: Build SL3000 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你的设备文件（main 分支）
      - name: Checkout device overlay
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          path: device

      # 2. 拉取 OpenWrt 源码（openwrt-25.12 分支）
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: openwrt-25.12
          path: openwrt

      # 3. 只复制你列出的这些路径
      - name: Apply SL3000 overlay
        run: |
          echo "=== Copy DTS ==="
          mkdir -p openwrt/target/linux/mediatek/dts
          cp -av device/target/linux/mediatek/dts/mt7981-sl3000.dts \
                openwrt/target/linux/mediatek/dts/

          echo "=== Copy filogic.mk ==="
          mkdir -p openwrt/target/linux/mediatek/image
          cp -av device/target/linux/mediatek/image/filogic.mk \
                openwrt/target/linux/mediatek/image/

          echo "=== Copy base-files ==="
          mkdir -p openwrt/target/linux/mediatek/filogic/base-files
          rsync -av device/target/linux/mediatek/filogic/base-files/ \
                openwrt/target/linux/mediatek/filogic/base-files/

          echo "=== Copy optional files/ (network config) ==="
          mkdir -p openwrt/target/linux/mediatek/filogic/files
          rsync -av device/target/linux/mediatek/filogic/files/ \
                openwrt/target/linux/mediatek/filogic/files/ || true

      # 4. 安装依赖
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev rsync unzip zlib1g-dev file python3

      # 5. 更新 feeds
      - name: Update Feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 6. defconfig
      - name: Configure SL3000
        working-directory: openwrt
        run: |
          make defconfig

      # 7. 编译固件
      - name: Build Firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s

      # 8. 上传固件（只上传 SL3000 的 .bin）
      - name: Upload SL3000 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-firmware
          path: |
            openwrt/bin/targets/**/sl3000*sysupgrade*.bin
            openwrt/bin/targets/**/sl3000*factory*.bin
