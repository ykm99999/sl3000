name: 编译 Docker 和 Passwall2 软件包

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '目标架构'
        required: true
        default: 'aarch64_cortex-a53'
        type: string

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-24.10
  REPO_BRANCH: 2410
  CCACHE_DIR: /tmp/ccache

jobs:
  build-packages:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: 检查代码
      uses: actions/checkout@v4

    - name: 深度磁盘清理
      run: |
        echo "=== 深度磁盘清理 ==="
        sudo sync
        echo 3 | sudo tee /proc/sys/vm/drop_caches
        
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /opt/hostedtoolcache/* \
          /usr/local/lib/node_modules
        
        sudo docker system prune -af 2>/dev/null || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        
        sudo journalctl --vacuum-time=1h
        sudo rm -rf /tmp/* /var/tmp/*
        
        echo "清理后磁盘:"
        df -h

    - name: 创建最小化配置
      run: |
        cat > minimal.config << 'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y
CONFIG_TARGET_ARCH_PACKAGES="${{ github.event.inputs.target_arch }}"
CONFIG_TARGET_ROOTFS_PARTSIZE=512

# 工具链配置
CONFIG_TOOLCHAIN=y
CONFIG_TOOLCHAIN_LIBC_USE_MUSL=y

# 基础系统（最小集）
CONFIG_BUSYBOX_CUSTOM=y
CONFIG_PACKAGE_base-files=y
CONFIG_PACKAGE_busybox=y
CONFIG_PACKAGE_libc=y
CONFIG_PACKAGE_libgcc=y
CONFIG_PACKAGE_libpthread=y
CONFIG_PACKAGE_librt=y
CONFIG_PACKAGE_libstdcpp=y

# Docker 必需内核模块
CONFIG_PACKAGE_kmod-veth=y
CONFIG_PACKAGE_kmod-br-netfilter=y
CONFIG_PACKAGE_kmod-nf-conntrack=y
CONFIG_PACKAGE_kmod-nf-conntrack-netlink=y
CONFIG_PACKAGE_kmod-nf-nat=y
CONFIG_PACKAGE_kmod-ipt-core=y

# 基础库
CONFIG_PACKAGE_libopenssl=y
CONFIG_PACKAGE_libcurl=y
CONFIG_PACKAGE_zlib=y
CONFIG_PACKAGE_libatomic=y
CONFIG_PACKAGE_libjson-c=y
CONFIG_PACKAGE_libpcre=y
CONFIG_PACKAGE_libselinux=y
CONFIG_PACKAGE_libseccomp=y
CONFIG_PACKAGE_libdevmapper=y
CONFIG_PACKAGE_libnetwork=y

# 网络工具
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget=y
CONFIG_PACKAGE_iptables=y
CONFIG_PACKAGE_iptables-mod-extra=y

# 禁用固件生成
CONFIG_TARGET_ROOTFS_SQUASHFS=n
CONFIG_TARGET_IMAGES=n
CONFIG_IB=n
EOF

    - name: 初始化环境
      run: |
        echo "=== 安装编译依赖 ==="
        sudo apt-get update
        sudo apt-get install -y \
          build-essential ccache curl \
          flex gawk gettext git libncurses5-dev libssl-dev \
          make patch pkgconf python3 python3-pip \
          rsync subversion unzip wget zlib1g-dev
        
        # 设置交换文件
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        
        echo "内存信息:"
        free -h

    - name: 配置编译缓存
      run: |
        sudo mkdir -p $CCACHE_DIR
        sudo chown -R $USER:$GROUPS $CCACHE_DIR
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        ccache -o compression=true
        ccache -o max_size=1G
        ccache -s

    - name: 克隆源码
      run: |
        echo "=== 浅层克隆源码 ==="
        git clone --depth=1 --filter=blob:limit=1M $REPO_URL -b $REPO_BRANCH openwrt
        echo "克隆后磁盘:"
        df -h

    - name: 配置 feeds
      run: |
        cd openwrt
        echo "=== 配置 feeds ==="
        
        # 确保 Passwall2 feeds
        if ! grep -q "passwall2" feeds.conf.default; then
          echo "src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git;main" >> feeds.conf.default
        fi
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 应用最小化配置
      run: |
        cd openwrt
        echo "=== 应用最小化配置 ==="
        cp ../minimal.config .config
        make defconfig
        
        echo "配置摘要:"
        echo "目标架构: $(grep 'CONFIG_TARGET_ARCH_PACKAGES' .config)"
        echo "启用的包数量: $(grep '^CONFIG_PACKAGE_' .config | wc -l)"

    - name: 下载工具链依赖
      run: |
        cd openwrt
        echo "=== 下载工具链 ==="
        make toolchain/download -j2
        make target/linux/download -j2
        echo "下载后磁盘:"
        df -h

    - name: 编译工具链
      run: |
        cd openwrt
        echo "=== 编译工具链 ==="
        make -j2 tools/compile toolchain/compile
        echo "工具链编译后磁盘:"
        df -h

    - name: 编译 Docker 完整包系列
      run: |
        cd openwrt
        echo "=== 编译 Docker 系列包 ==="
        
        # Docker 核心包
        make package/feeds/packages/docker/compile -j2 V=0
        make package/feeds/packages/dockerd/compile -j2 V=0
        make package/feeds/packages/docker-compose/compile -j2 V=0
        
        # Docker 管理界面
        make package/feeds/packages/luci-app-dockerman/compile -j2 V=0
        make package/feeds/packages/luci-lib-docker/compile -j2 V=0
        make package/feeds/packages/luci-i18n-dockerman-zh-cn/compile -j2 V=0
        
        # Docker 依赖
        make package/feeds/packages/containerd/compile -j2 V=0
        make package/feeds/packages/runc/compile -j2 V=0
        make package/feeds/packages/tini/compile -j2 V=0
        
        echo "Docker 编译完成"
        sudo sync
        echo 3 | sudo tee /proc/sys/vm/drop_caches

    - name: 编译 Passwall2 完整包系列
      run: |
        cd openwrt
        echo "=== 编译 Passwall2 系列包 ==="
        
        # Passwall2 主程序
        make package/feeds/passwall2/luci-app-passwall2/compile -j2 V=0
        make package/feeds/passwall2/luci-i18n-passwall2-zh-cn/compile -j2 V=0
        
        # Passwall2 依赖的核心包
        make package/feeds/packages/v2ray-core/compile -j2 V=0
        make package/feeds/packages/xray-core/compile -j2 V=0
        make package/feeds/packages/shadowsocks-rust/compile -j2 V=0
        make package/feeds/packages/trojan/compile -j2 V=0
        make package/feeds/packages/simple-obfs/compile -j2 V=0
        
        # 网络工具
        make package/feeds/packages/curl/compile -j2 V=0
        make package/feeds/packages/wget/compile -j2 V=0
        make package/feeds/packages/iptables/compile -j2 V=0
        
        echo "Passwall2 编译完成"
        sudo sync
        echo 3 | sudo tee /proc/sys/vm/drop_caches

    - name: 收集生成的 IPK 包
      run: |
        cd openwrt
        echo "=== 收集 IPK 包 ==="
        
        mkdir -p ../ipk-packages
        
        # 收集所有包
        find bin -name "*.ipk" | while read file; do
          echo "📦 $(basename "$file")"
          cp "$file" ../ipk-packages/
        done
        
        echo "IPK_PACKAGES_DIR=$(pwd)/../ipk-packages" >> $GITHUB_ENV
        
        echo "最终磁盘使用:"
        df -h

    - name: 生成包列表和安装说明
      run: |
        cd ipk-packages
        echo "# Docker 和 Passwall2 软件包" > README.md
        echo "" >> README.md
        echo "## 生成的软件包列表" >> README.md
        echo "" >> README.md
        echo "| 包名 | 大小 |" >> README.md
        echo "|------|------|" >> README.md
        ls -1 *.ipk | while read pkg; do
          size=$(du -h "$pkg" | cut -f1)
          echo "| $pkg | $size |" >> README.md
        done
        
        echo "" >> README.md
        echo "## 安装说明" >> README.md
        echo "" >> README.md
        echo "### 1. 上传包到路由器" >> README.md
        echo '```bash' >> README.md
        echo "# 上传所有包" >> README.md
        echo "scp *.ipk root@192.168.1.1:/tmp/" >> README.md
        echo '```' >> README.md
        echo "" >> README.md
        echo "### 2. 安装 Docker 系列" >> README.md
        echo '```bash' >> README.md
        echo "opkg install /tmp/docker*.ipk" >> README.md
        echo "opkg install /tmp/luci-app-dockerman*.ipk" >> README.md
        echo "opkg install /tmp/containerd*.ipk /tmp/runc*.ipk" >> README.md
        echo '```' >> README.md
        echo "" >> README.md
        echo "### 3. 安装 Passwall2 系列" >> README.md
        echo '```bash' >> README.md
        echo "opkg install /tmp/luci-app-passwall2*.ipk" >> README.md
        echo "opkg install /tmp/v2ray*.ipk /tmp/xray*.ipk /tmp/shadowsocks*.ipk" >> README.md
        echo '```' >> README.md

    - name: 上传 IPK 软件包
      uses: actions/upload-artifact@v4
      with:
        name: ipk-packages-${{ github.event.inputs.target_arch }}-$(date +%Y%m%d)
        path: |
          ipk-packages/*.ipk
          ipk-packages/README.md
        retention-days: 30
        compression-level: 0

    - name: 编译统计
      if: always()
      run: |
        echo "=== 编译统计 ==="
        ccache -s
        echo "生成的 IPK 包:"
        find ipk-packages -name "*.ipk" | wc -l | xargs echo "数量:"
        find ipk-packages -name "*.ipk" -exec du -ch {} + | grep total | cut -f1 | xargs echo "总大小:"
        echo "磁盘使用:"
        df -h

    - name: 清理交换文件
      if: always()
      run: |
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile 2>/dev/null || true
