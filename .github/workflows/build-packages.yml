name: Build SL-3000 Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 磁盘清理，释放空间
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/share/boost
        sudo docker rmi $(docker images -q) || true
        df -h

    # 安装依赖
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget curl unzip \
          libncurses5-dev libncursesw5-dev zlib1g-dev gawk flex gettext \
          libssl-dev python3 python3-distutils

    # 拉取 OpenWrt 源码
    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 配置只编译 docker 和 passwall2
    - name: Configure Packages
      run: |
        cd openwrt
        make defconfig
        # 清空默认配置，只选需要的包
        sed -i '/CONFIG_PACKAGE_/d' .config
        echo "CONFIG_PACKAGE_docker=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall2=y" >> .config
        make defconfig

    # 编译
    - name: Build Packages
      run: |
        cd openwrt
        make package/docker/compile V=s -j$(nproc)
        make package/luci-app-passwall2/compile V=s -j$(nproc)

    # 上传编译结果
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: sl3000-packages
        path: openwrt/bin/packages/
