name: Build SL3000 Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - sl3000

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 0. Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # 1. Optimize Disk Space
      # -----------------------------
      - name: Optimize Disk Space
        run: |
          echo "=== Cleaning disk ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          df -h

      # -----------------------------
      # 2. Cache
      # -----------------------------
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: dl
          key: ${{ runner.os }}-sl3000-dl

      - name: Cache Toolchain
        uses: actions/cache@v4
        with:
          path: |
            build_dir/toolchain-*
            staging_dir/toolchain-*
          key: ${{ runner.os }}-sl3000-toolchain

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-sl3000-ccache

      # -----------------------------
      # 3. Install Dependencies
      # -----------------------------
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev rsync unzip zlib1g-dev file python3

      # -----------------------------
      # 4. Run Quick Test
      # -----------------------------
      - name: Run SL3000 Quick Test
        run: |
          chmod +x scripts/quick-test-sl3000.sh || true
          chmod +x scripts/check-sl3000.sh || true
          echo "=== Running SL3000 Quick Test ==="
          if [ -f scripts/quick-test-sl3000.sh ]; then
            ./scripts/quick-test-sl3000.sh
          elif [ -f scripts/check-sl3000.sh ]; then
            ./scripts/check-sl3000.sh
          else
            echo "ERROR: No test script found"
            exit 1
          fi

      # -----------------------------
      # 5. Update Feeds
      # -----------------------------
      - name: Update Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # -----------------------------
      # 6. Configure SL3000
      # -----------------------------
      - name: Configure SL3000
        run: |
          make defconfig

      # -----------------------------
      # 7. Build Firmware
      # -----------------------------
      - name: Build Firmware
        run: |
          echo "=== Building SL3000 ==="
          make -j$(nproc) || make -j1 V=s

      # -----------------------------
      # 8. Upload Firmware
      # -----------------------------
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-firmware
          path: bin/targets/
