name: Build SL3000 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout device files (default branch)
      - name: Checkout device files
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: device

      # 2. Checkout OpenWrt source (openwrt-25.12 branch)
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: openwrt-25.12
          path: openwrt

      # 3. Copy SL3000 device files into OpenWrt source
      - name: Apply SL3000 device files
        run: |
          rsync -av device/ openwrt/

      # 4. Optimize disk
      - name: Optimize Disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

      # 5. Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev rsync unzip zlib1g-dev file python3

      # 6. Update feeds
      - name: Update Feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 7. Configure
      - name: Configure SL3000
        working-directory: openwrt
        run: |
          make defconfig

      # 8. Build firmware
      - name: Build Firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s

      # 9. Upload firmware
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-firmware
          path: openwrt/bin/targets/
