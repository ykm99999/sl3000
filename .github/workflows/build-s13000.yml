name: Build SL3000 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout SL3000 overlay 仓库（当前 repo）
      - name: Checkout SL3000 overlay
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: device

      # 2. Checkout OpenWrt 源码
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt

      # 3. 应用 overlay 到 OpenWrt
      - name: Apply SL3000 overlay
        run: |
          rsync -av device/target/linux/mediatek/dts/ \
                openwrt/target/linux/mediatek/dts/

          rsync -av device/target/linux/mediatek/image/ \
                openwrt/target/linux/mediatek/image/

          rsync -av device/target/linux/mediatek/filogic/ \
                openwrt/target/linux/mediatek/filogic/

      # 4. 磁盘优化
      - name: Optimize Disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

      # 5. 安装依赖
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev rsync unzip zlib1g-dev file python3

      # 6. 更新 feeds
      - name: Update Feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 7. 写入 .config（无 USB），逐行 echo，避免 YAML/EOF 坑
      - name: Apply SL3000 .config (no USB)
        working-directory: openwrt
        run: |
          rm -f .config
          touch .config

          echo 'CONFIG_TARGET_mediatek=y' >> .config
          echo 'CONFIG_TARGET_mediatek_filogic=y' >> .config
          echo 'CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y' >> .config

          echo 'CONFIG_PACKAGE_base-files=y' >> .config
          echo 'CONFIG_PACKAGE_busybox=y' >> .config
          echo 'CONFIG_PACKAGE_ca-bundle=y' >> .config
          echo 'CONFIG_PACKAGE_ca-certificates=y' >> .config
          echo 'CONFIG_PACKAGE_dnsmasq-full=y' >> .config
          echo 'CONFIG_PACKAGE_dropbear=y' >> .config
          echo 'CONFIG_PACKAGE_firewall4=y' >> .config
          echo 'CONFIG_PACKAGE_iptables-nft=y' >> .config
          echo 'CONFIG_PACKAGE_iwinfo=y' >> .config
          echo 'CONFIG_PACKAGE_logd=y' >> .config
          echo 'CONFIG_PACKAGE_mtd=y' >> .config
          echo 'CONFIG_PACKAGE_netifd=y' >> .config
          echo 'CONFIG_PACKAGE_odhcp6c=y' >> .config
          echo 'CONFIG_PACKAGE_odhcpd-ipv6only=y' >> .config
          echo 'CONFIG_PACKAGE_opkg=y' >> .config
          echo 'CONFIG_PACKAGE_uci=y' >> .config
          echo 'CONFIG_PACKAGE_urandom-seed=y' >> .config
          echo 'CONFIG_PACKAGE_urngd=y' >> .config

          echo 'CONFIG_PACKAGE_luci=y' >> .config
          echo 'CONFIG_PACKAGE_luci-base=y' >> .config
          echo 'CONFIG_PACKAGE_luci-compat=y' >> .config
          echo 'CONFIG_PACKAGE_luci-mod-admin-full=y' >> .config
          echo 'CONFIG_PACKAGE_luci-theme-bootstrap=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-opkg=y' >> .config
          echo 'CONFIG_PACKAGE_luci-proto-ppp=y' >> .config
          echo 'CONFIG_PACKAGE_luci-proto-ipv6=y' >> .config

          echo 'CONFIG_PACKAGE_ppp=y' >> .config
          echo 'CONFIG_PACKAGE_ppp-mod-pppoe=y' >> .config
          echo 'CONFIG_PACKAGE_pppoe-discovery=y' >> .config
          echo 'CONFIG_PACKAGE_ipv6helper=y' >> .config

          echo 'CONFIG_PACKAGE_kmod-mt7981-firmware=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-mt76=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-mt76-core=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-mt76-connac=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-mt76-mt7981=y' >> .config
          echo 'CONFIG_PACKAGE_wireless-regdb=y' >> .config
          echo 'CONFIG_PACKAGE_wpad-basic-mbedtls=y' >> .config

          echo 'CONFIG_PACKAGE_kmod-mediatek_eth=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-mediatek_hnat=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-nft-offload=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-pppoe=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-pppox=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-ipt-nat=y' >> .config

          echo 'CONFIG_PACKAGE_kmod-gpio-button-hotplug=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-leds-gpio=y' >> .config

          echo 'CONFIG_PACKAGE_htop=y' >> .config
          echo 'CONFIG_PACKAGE_vim-full=y' >> .config
          echo 'CONFIG_PACKAGE_curl=y' >> .config
          echo 'CONFIG_PACKAGE_wget-ssl=y' >> .config
          echo 'CONFIG_PACKAGE_tcpdump-mini=y' >> .config

          echo 'CONFIG_PACKAGE_libzstd=y' >> .config
          echo 'CONFIG_PACKAGE_zstd=y' >> .config

          echo 'CONFIG_PACKAGE_libopenssl=y' >> .config
          echo 'CONFIG_PACKAGE_libwolfssl=y' >> .config
          echo 'CONFIG_PACKAGE_libmbedtls=y' >> .config

          echo 'CONFIG_BUSYBOX_DEFAULT_FEATURE_EDITING_HISTORY=256' >> .config
          echo 'CONFIG_BUSYBOX_DEFAULT_FEATURE_EDITING_SAVEHISTORY=y' >> .config
          echo 'CONFIG_BUSYBOX_DEFAULT_FEATURE_EDITING_SAVE_ON_EXIT=y' >> .config

          echo 'CONFIG_TARGET_MULTI_PROFILE=y' >> .config
          echo 'CONFIG_TARGET_PER_DEVICE_ROOTFS=y' >> .config
          echo 'CONFIG_TARGET_ROOTFS_INITRAMFS=n' >> .config

          make defconfig

      # 8. 编译固件
      - name: Build Firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      # 9. 上传构建产物（artifact）
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-firmware
          path: openwrt/bin/targets/

      # 10. 自动创建 Release 并附带固件
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sl3000-$(date +'%Y%m%d-%H%M')
          name: "SL3000 Firmware $(date +'%Y-%m-%d %H:%M')"
          files: openwrt/bin/targets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
